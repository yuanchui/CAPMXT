<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>启动中</title>
  <style>
    :root {
      color-scheme: dark;
    }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 20% 20%, #1f2937 0%, #0f172a 45%, #020617 100%);
      color: #e5e7eb;
      overflow: hidden;
    }
    .wrap {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #3b82f6, #22d3ee);
      box-shadow: 0 10px 40px rgba(59, 130, 246, 0.35);
      animation: float 1.8s ease-in-out infinite;
    }
    .title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .subtitle {
      font-size: 13px;
      color: #93c5fd;
    }
    .bar {
      width: 260px;
      height: 6px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.25);
      overflow: hidden;
      position: relative;
    }
    .bar::after {
      content: "";
      position: absolute;
      left: -40%;
      top: 0;
      width: 40%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #60a5fa, #22d3ee);
      animation: loading 1.1s ease-in-out infinite;
    }
    @keyframes loading {
      0% { left: -40%; }
      100% { left: 100%; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo"></div>
    <div class="title">Serial Terminal</div>
    <div class="subtitle">正在验证运行环境，请稍候...</div>
    <div class="bar"></div>
  </div>
</body>
</html>

描述QS3VH125 是一款高带宽四总线开关。QS3VH125 具有非常低的导通电阻，导致通过开关的传播延迟小于250皮秒。这些开关可以在单独的LVTTL兼容低电平有效的输出使能信号控制下导通，实现双向数据流传输且无额外延迟或地弹。在导通状态下，开关可以传递高达5V的信号。在关断状态下，开关在端子处提供非常高的阻抗。接近零的传播延迟、高关断阻抗和过压耐受性的结合使得QS3VH125非常适合高性能通信应用。QS3VH125 的工作温度范围为-40°C至+85°C。

